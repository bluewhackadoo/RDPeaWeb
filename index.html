<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RDPea — Remote desktop for sysadmins</title>
  <link rel="icon" href="./assets/icon.png" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    html, body { margin: 0; background: var(--surface-950); color: var(--fg-1); }
    * { box-sizing: border-box; }
    a { color: inherit; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--surface-700); border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <defs>
        <radialGradient id="p" cx="50%" cy="45%" r="55%">
          <stop offset="0" stop-color="#E6FFC8"/>
          <stop offset=".22" stop-color="#7EC850"/>
          <stop offset=".58" stop-color="#4A9C28"/>
          <stop offset="1" stop-color="#1A4A08"/>
        </radialGradient>
      </defs>
      <rect width="200" height="200" fill="#020617"/>
      <circle cx="100" cy="92" r="52" fill="url(#p)"/>
      <text x="100" y="170" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="700" font-size="22" fill="#cbd5e1">RD<tspan fill="#7EC850" font-style="italic">Pea</tspan></text>
    </svg>
  </template>
  <div id="top" data-screen-label="Website"></div>
  <script type="text/babel" src="./primitives.jsx"></script>
  <script type="text/babel" src="./Header.jsx"></script>
  <script type="text/babel" src="./Hero.jsx"></script>
  <script type="text/babel" src="./FeatureGrid.jsx"></script>
  <script type="text/babel" src="./ScreenshotShowcase.jsx"></script>
  <script type="text/babel" src="./SupportSection.jsx"></script>
  <script type="text/babel" src="./FAQ.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const scrollTo = (id) => {
        if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 64, behavior: 'smooth' });
      };

      return (
        <>
          <Header onNav={scrollTo} />
          <Hero />
          <FeatureGrid />
          <ScreenshotShowcase />
          <SupportSection />
          <FAQ />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('top')).render(<App />);
  </script>
</body>
</html>
